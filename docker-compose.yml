version: '3.8'

services:
  shelly:
    build: .
    container_name: shelly
    ports:
      - "8080:8080"
    volumes:
      - ./backend/config.yaml:/app/config.yaml
      - shelly-data:/app/data
    environment:
      - TZ=Asia/Shanghai
    restart: unless-stopped

volumes:
  shelly-data:
    driver: local
